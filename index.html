<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC ADVANCED | ErickDev Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://utils.creeper.host/images/face/creeper">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loader">
        <div class="creeper-face-pixel">
            <div class="pixel-eye"></div>
            <div class="pixel-eye"></div>
            <div class="pixel-mouth"></div>
        </div>
        <h2 class="mc-font">MOJANG STUDIOS</h2>
        <div class="loading-bar-mc"><div class="fill"></div></div>
    </div>

    <div class="mc-dirt-bg"></div>
    
    <header class="main-header">
        <img src="https://fontmeme.com/permalink/240324/5f949861694f4f35862d513725798934.png" alt="Minecraft Logo" class="mc-logo">
        <h1 class="neon-text-pro">ADVANCED <span class="edition">EDITION</span></h1>
        <div class="version-badge">OFFICIAL v1.26.10.4</div>
    </header>

    <main class="mc-menu-container">
        <section class="mc-card-pro">
            <div class="mc-image-container">
                <img src="https://www.minecraft.net/content/dam/games/minecraft/key-art/MC-Vanilla-Standard-Edition_Key-Art_800x450.jpg" alt="Minecraft" class="mc-thumb">
            </div>
            <div class="mc-info">
                <h2 class="mc-font">MINECRAFT BEDROCK</h2>
                <p>Descarga la versión estable para 64 bits optimizada.</p>
                <div class="mc-button-group">
                    <a href="https://www.mediafire.com/file/seswa9mbv170lmx/MinecraftBedrock64Bits-1.26.3.1-zRingPvP.apk/file" target="_blank" class="mc-btn mc-btn-green">DESCARGAR APK</a>
                    <a href="https://www.minecraft.net/" target="_blank" class="mc-btn mc-btn-gray">SITIO OFICIAL</a>
                </div>
            </div>
        </section>

        <div class="mc-grid">
            <div class="mc-card-mini">
                <h3 class="mc-font">SKINS 4D</h3>
                <p>Modelos con relieve.</p>
                <button class="mc-btn mc-btn-blue">EXPLORAR</button>
            </div>
            <div class="mc-card-mini" onclick="window.location.href='funciones.html'">
                <h3 class="mc-font">SCRIPTS</h3>
                <p>Terminal de códigos.</p>
                <button class="mc-btn mc-btn-cyan">CONSOLA</button>
            </div>
        </div>

        <section class="mc-card-pro community-section">
            <h2 class="mc-font">COMUNIDAD</h2>
            <div id="comments-display" class="mc-chat-box">
                </div>
            <div class="mc-input-group">
                <input type="text" id="user-name" placeholder="Tu nombre..." class="mc-input">
                <textarea id="user-comment" placeholder="Escribe un comentario..." class="mc-input"></textarea>
                <button class="mc-btn mc-btn-green" onclick="enviarComentario()">ENVIAR MENSAJE</button>
            </div>
        </section>
    </main>

    <footer class="mc-footer">
        <p>DESARROLLADO POR <strong>ERICKDEV</strong> - 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
